name: Feature request
description: Suggest a practical editor or sight-building improvement.
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested behavior
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example or reference
